name: Auto-Renew-ACL
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 */3 * *' # 每隔3天 12点(UTC 2点) 运行

jobs:
  Renew-acl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write
    steps:
      - name: 📥 下载公库代码
        uses: actions/checkout@v5

      - name: 🔒 拉取私有仓库脚本
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/aclclouds_renew_private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private-scripts

      - name: ⚙️ 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ 安装系统依赖和 Python 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk
          pip install requests seleniumbase
          seleniumbase install chromedriver

      - name: 🌐 配置sing-box代理
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          # 手动安装sing-box避免第三方脚本报错
          LATEST_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep tag_name | cut -d '"' -f4)
          wget -q https://github.com/SagerNet/sing-box/releases/download/$LATEST_VERSION/sing-box-${LATEST_VERSION#v}-linux-amd64.tar.gz
          tar -xzf sing-box-*-linux-amd64.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          # 配置并启动
          mkdir -p /etc/sing-box
          echo $NODE_LINK | base64 -d > /etc/sing-box/config.json
          nohup sing-box run -c /etc/sing-box/config.json > /tmp/sing-box.log 2>&1 &
          sleep 5
          # 验证代理生效
          curl -x socks5://127.0.0.1:1080 https://api.ip.sb/ip

      - name: 🚀 运行私库续期脚本
        env:
          PYTHONIOENCODING: utf-8
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          COOKIE_VALUE: ${{ secrets.COOKIE_VALUE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1366x768x24" \
            python3 private-scripts/aclclouds_renew.py

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id || true
            fi
          done
